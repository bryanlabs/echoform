name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test
